<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dani's St. Louis Visit</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
            padding: 2.5rem 1.25rem 4rem;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0 0 0.25rem;
            border-bottom: 1px solid #2a2a2a;
            padding-bottom: 0.4rem;
            color: #fff;
        }

        h2 {
            margin-top: 2.2rem;
            font-size: 1.45rem;
            color: #fff;
        }

        h3 {
            color: #a0a0a0;
            font-weight: 500;
            margin-top: 0.25rem;
        }

        hr {
            border: none;
            border-top: 1px solid #2a2a2a;
            margin: 2rem 0;
        }

        a {
            color: #7eb6ff;
        }

        strong {
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
        }

        th, td {
            text-align: left;
            padding: 0.55rem 0.75rem;
            border-bottom: 1px solid #2a2a2a;
            vertical-align: top;
        }

        th {
            background: #1a1a1a;
            font-weight: 600;
            color: #fff;
        }

        tr:hover td {
            background: #161616;
        }

        ul {
            padding-left: 1.25rem;
        }

        code {
            background: #1e1e1e;
            color: #f0c674;
            padding: 0.1em 0.35em;
            border-radius: 3px;
            font-size: 0.9em;
        }

        #content.loading {
            color: #666;
        }

        @media (max-width: 540px) {
            main { padding: 1.5rem 1rem 3rem; }
            h1 { font-size: 1.7rem; }
            th, td { padding: 0.5rem 0.4rem; font-size: 0.95rem; }
        }
    </style>
</head>

<body>
    <main>
        <article id="content" class="loading">Loading…</article>
    </main>

    <script>
        fetch('../danis-stl-visit.md')
            .then(r => {
                if (!r.ok) throw new Error('Failed to load');
                return r.text();
            })
            .then(md => {
                const el = document.getElementById('content');
                el.classList.remove('loading');
                el.innerHTML = marked.parse(md);
            })
            .catch(err => {
                document.getElementById('content').textContent = 'Error loading content.';
            });
    </script>
</body>

</html>
